kind = "web"
previewPath = "/"
title = "আলোরমেলা - অনলাইন বুকশপ"
version = "1.0.0"
id = "artifacts/aloromela"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20148

[services.development]
run = "pnpm --filter @workspace/aloromela run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aloromela", "run", "build" ]
publicDir = "artifacts/aloromela/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20148"
BASE_PATH = "/"

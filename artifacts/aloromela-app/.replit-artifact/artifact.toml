kind = "mobile"
previewPath = "/aloromela-app/"
title = "আলোরমেলা অ্যাপ"
version = "1.0.0"
id = "artifacts/aloromela-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/aloromela-app/" ]
localPort = 21564

[services.development]
run = "pnpm --filter @workspace/aloromela-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aloromela-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aloromela-app", "run", "serve" ]

[services.env]
PORT = "21564"
BASE_PATH = "/aloromela-app/"

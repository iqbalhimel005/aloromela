    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        mobile:
          type: string
        district:
          type: string
        upazila:
          type: string
        postOffice:
          type: string
        village:
          type: string
      required:
        - name
        - mobile
        - district
        - upazila

    SendOtpBody:
      type: object
      properties:
        mobile:
          type: string
      required:
        - mobile

    OtpSendResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        otp:
          type: string
          description: Demo OTP (only in development)
      required:
        - success
        - message

    VerifyOtpBody:
      type: object
      properties:
        mobile:
          type: string
        otp:
          type: string
      required:
        - mobile
        - otp

    OtpVerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        customerId:
          type: integer
      required:
        - success
        - message

    SellRequest:
      type: object
      properties:
        id:
          type: integer
        sellerName:
          type: string
        mobile:
          type: string
        bookTitle:
          type: string
        bookAuthor:
          type: string
        category:
          $ref: "#/components/schemas/BookCategory"
        condition:
          type: string
          enum: [new, good, fair]
        askingPrice:
          type: number
        description:
          type: string
        status:
          type: string
          enum: [pending, reviewed, accepted, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sellerName
        - mobile
        - bookTitle
        - category
        - condition
        - askingPrice
        - status
        - createdAt

    CreateSellRequestBody:
      type: object

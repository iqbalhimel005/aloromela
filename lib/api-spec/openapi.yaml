    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleBn:
          type: string
        author:
          type: string
        authorBn:
          type: string
        publisher:
          type: string
        publisherBn:
          type: string
        price:
          type: number
        discountedPrice:
          type: number
        category:
          $ref: "#/components/schemas/BookCategory"
        coverImage:
          type: string
        description:
          type: string
        descriptionBn:
          type: string
        previewText:
          type: string
        previewTextBn:
          type: string
        isbn:
          type: string
        edition:
          type: string
        stockCount:
          type: integer
        rating:
          type: number
        reviewCount:
          type: integer
        isFeatured:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - titleBn
        - author
        - authorBn
        - price
        - category
        - coverImage
        - stockCount
        - isFeatured
        - createdAt

    BookListResponse:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - books
        - total
        - page
        - totalPages

    BookStats:
      type: object
      properties:
        total:
          type: integer
        school:
          type: integer
        college:
          type: integer
        degree:
          type: integer
        honours:
          type: integer
        job:
          type: integer
        novel:
          type: integer
        storyPoem:
          type: integer
      required:
        - total
        - school
        - college
        - degree
        - honours
        - job
        - novel
        - storyPoem

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        mobile:
          type: string
        district:
          type: string
        upazila:
          type: string
        postOffice:
          type: string
        village:
          type: string
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

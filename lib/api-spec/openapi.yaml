          type: string
        bookTitle:
          type: string
        bookAuthor:
          type: string
        category:
          $ref: "#/components/schemas/BookCategory"
        condition:
          type: string
          enum: [new, good, fair]
        askingPrice:
          type: number
        description:
          type: string
      required:
        - sellerName
        - mobile
        - bookTitle
        - category
        - condition
        - askingPrice

    BookRequest:
      type: object
      properties:
        id:
          type: integer
        requesterName:
          type: string
        mobile:
          type: string
        bookTitle:
          type: string
        bookAuthor:
          type: string
        category:
          $ref: "#/components/schemas/BookCategory"
        notes:
          type: string
        status:
          type: string
          enum: [pending, found, unavailable]
        createdAt:

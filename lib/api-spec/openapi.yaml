        - mobile
        - bookTitle

    AuthorAd:
      type: object
      properties:
        id:
          type: integer
        authorName:
          type: string
        mobile:
          type: string
        email:
          type: string
        bookTitle:
          type: string
        bookDescription:
          type: string
        genre:
          type: string
        publisherName:
          type: string
        publishYear:
          type: integer
        price:
          type: number
        coverImage:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - authorName
        - mobile
        - bookTitle
        - bookDescription
        - genre
        - status
        - createdAt

    CreateAuthorAdBody:
      type: object

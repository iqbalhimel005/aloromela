openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: আলোরমেলা বুকশপ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book operations
  - name: customers
    description: Customer operations
  - name: sell-requests
    description: Sell request operations
  - name: book-requests
    description: Book demand/request operations
  - name: author-ads
    description: Author advertisement operations
  - name: offers
    description: Offer and discount operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List books
      description: List books with optional category filter
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/BookCategory"
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /books/featured:
    get:
      operationId: getFeaturedBooks
      tags: [books]
      summary: Get featured books
      description: Get featured/highlighted books for homepage
      responses:
        "200":
          description: Featured books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

  /books/stats:
    get:
      operationId: getBookStats
      tags: [books]
      summary: Get book statistics
      description: Category-wise book counts for homepage
      responses:
        "200":
          description: Book stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookStats"

  /customers:
    post:
      operationId: registerCustomer
      tags: [customers]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Customer registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/verify-otp:
    post:
      operationId: verifyOtp
      tags: [customers]
      summary: Verify OTP for mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpVerifyResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/send-otp:
    post:
      operationId: sendOtp
      tags: [customers]
      summary: Send OTP to mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpBody"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResponse"

  /sell-requests:
    post:
      operationId: createSellRequest
      tags: [sell-requests]
      summary: Submit a book sell request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSellRequestBody"
      responses:
        "201":
          description: Sell request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listSellRequests
      tags: [sell-requests]
      summary: List sell requests
      responses:
        "200":
          description: List of sell requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellRequest"

  /book-requests:
    post:
      operationId: createBookRequest
      tags: [book-requests]
      summary: Submit a book demand/request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequestBody"
      responses:
        "201":
          description: Book request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookRequest"

    get:
      operationId: listBookRequests
      tags: [book-requests]
      summary: List book requests
      responses:
        "200":
          description: List of book requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookRequest"

  /author-ads:
    post:
      operationId: createAuthorAd
      tags: [author-ads]
      summary: Submit an author advertisement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuthorAdBody"
      responses:
        "201":
          description: Author ad submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorAd"

    get:
      operationId: listAuthorAds
      tags: [author-ads]
      summary: List author advertisements
      responses:
        "200":
          description: List of author ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthorAd"

  /offers:
    get:
      operationId: listOffers
      tags: [offers]
      summary: List active offers and discounts
      responses:
        "200":
          description: List of active offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Offer"

  /orders:
    post:
      operationId: createOrder
      tags: [books]
      summary: Place a book order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"


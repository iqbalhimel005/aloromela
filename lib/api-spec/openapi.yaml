        authorName:
          type: string
        mobile:
          type: string
        email:
          type: string
        bookTitle:
          type: string
        bookDescription:
          type: string
        genre:
          type: string
        publisherName:
          type: string
        publishYear:
          type: integer
        price:
          type: number
      required:
        - authorName
        - mobile
        - bookTitle
        - bookDescription
        - genre

    Offer:
      type: object
      properties:
        id:
          type: integer
        titleBn:
          type: string
        descriptionBn:
          type: string
        discountPercent:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        isActive:
          type: boolean
        badgeText:
          type: string
        category:
          $ref: "#/components/schemas/BookCategory"
      required:
        - id
        - titleBn
        - descriptionBn
        - discountPercent
        - isActive

    CreateOrderBody:
      type: object
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        mobile:
          type: string
        address:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              bookId:
                type: integer
              quantity:
                type: integer
            required:
              - bookId
              - quantity
        paymentMethod:
          type: string
          enum: [cash, bkash, rocket, nagad, sonali-bank, islami-bank]
        paymentNumber:
          type: string
        notes:
          type: string
      required:
        - customerName
        - mobile
        - address
        - items
        - paymentMethod

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        mobile:
          type: string
        address:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              bookId:
                type: integer
              bookTitle:
                type: string
              quantity:
                type: integer
              price:
                type: number
            required:
              - bookId
              - bookTitle
              - quantity
              - price
        totalAmount:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - customerName
        - mobile
        - address
        - items
        - totalAmount
        - paymentMethod
        - status
        - createdAt
